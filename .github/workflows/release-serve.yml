name: Release serve

on:
  push:
    tags:
      - "serve-v*"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck --workspace=serve

      - name: Test
        run: npm run test --workspace=serve

      - name: Build
        run: npm run build --workspace=serve

      - name: Publish to npm
        working-directory: serve
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public

      - name: Generate changelog
        id: changelog
        run: |
          TAG="${GITHUB_REF_NAME}"
          PREV_TAG=$(git tag --list 'serve-v*' --sort=-version:refname | head -2 | tail -1)
          if [ -n "$PREV_TAG" ] && [ "$PREV_TAG" != "$TAG" ]; then
            LOG=$(git log "${PREV_TAG}..${TAG}" --pretty=format:"- %s (%h)" -- serve/)
          else
            LOG=$(git log "${TAG}" --pretty=format:"- %s (%h)" -- serve/)
          fi
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$LOG" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: serve ${{ github.ref_name }}
          body: |
            ## Changes
            ${{ steps.changelog.outputs.body }}
          draft: false
          prerelease: false
