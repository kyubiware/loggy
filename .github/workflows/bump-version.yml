name: Bump version

on:
  workflow_dispatch:
    inputs:
      workspace:
        description: "Workspace to bump"
        required: true
        type: choice
        options:
          - extension
          - serve
          - both
      bump_type:
        description: "Version bump type"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  bump-extension:
    if: inputs.workspace == 'extension' || inputs.workspace == 'both'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Bump version
        id: bump
        working-directory: extension
        run: |
          node scripts/bump-version.cjs ${{ inputs.bump_type }}
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        working-directory: extension
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json manifest-chrome.json manifest-firefox.json package.json
          git commit -m "chore(extension): bump to v${{ steps.bump.outputs.version }}"
          git push origin HEAD:${{ github.ref_name }}

  bump-serve:
    if: inputs.workspace == 'serve' || inputs.workspace == 'both'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Bump version
        id: bump
        working-directory: serve
        run: |
          npm version ${{ inputs.bump_type }} -m "chore(serve): bump to %s"
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        run: |
          git push origin HEAD:${{ github.ref_name }}
