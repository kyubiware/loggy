name: Release extension

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: "Version bump type"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck --workspace=extension

      - name: Test
        run: npm run test:run --workspace=extension

      - name: Bump version
        id: bump
        working-directory: extension
        run: |
          node scripts/bump-version.cjs ${{ github.event.inputs.bump_type }}
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build Firefox extension
        working-directory: extension
        run: npm run build:firefox

      - name: Lint with web-ext
        working-directory: extension
        run: npx web-ext lint --source-dir dist-firefox

      - name: Package XPI
        working-directory: extension
        run: |
          rm -f loggy-firefox.xpi
          (cd dist-firefox && zip -r ../loggy-firefox.xpi .)

      - name: Package source code for AMO
        working-directory: extension
        run: npm run source-zip

      - name: Sign with AMO (listed)
        working-directory: extension
        run: |
          npx web-ext sign \
            --source-dir dist-firefox \
            --channel listed \
            --artifacts-dir web-ext-artifacts \
            --upload-source-code loggy-source.zip \
            --api-key "$AMO_API_KEY" \
            --api-secret "$AMO_API_SECRET"
        env:
          AMO_API_KEY: ${{ secrets.AMO_API_KEY }}
          AMO_API_SECRET: ${{ secrets.AMO_API_SECRET }}

      - name: Commit version bump and tag
        working-directory: extension
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json manifest-chrome.json manifest-firefox.json package.json
          git commit -m "release(extension): v${{ steps.bump.outputs.version }}"
          git tag "${{ steps.bump.outputs.tag }}"

      - name: Push commit and tag
        run: |
          git push origin HEAD:${{ github.ref_name }}
          git push origin "${{ steps.bump.outputs.tag }}"

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --list 'v*' --sort=-version:refname | head -2 | tail -1)
          if [ -n "$PREV_TAG" ]; then
            LOG=$(git log "${PREV_TAG}..${{ steps.bump.outputs.tag }}" --pretty=format:"- %s (%h)" -- extension/)
          else
            LOG=$(git log "${{ steps.bump.outputs.tag }}" --pretty=format:"- %s (%h)" -- extension/)
          fi
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$LOG" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump.outputs.tag }}
          name: Extension v${{ steps.bump.outputs.version }}
          body: |
            ## Changes
            ${{ steps.changelog.outputs.body }}
          draft: false
          prerelease: false
          files: |
            extension/web-ext-artifacts/*.xpi
            extension/loggy-firefox.xpi
            extension/loggy-source.zip
