name: Release extension

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck --workspace=extension

      - name: Test
        run: npm run test:run --workspace=extension

      - name: Generate changelog
        id: changelog
        run: |
          TAG="${GITHUB_REF_NAME}"
          PREV_TAG=$(git tag --list 'v*' --sort=-version:refname | head -2 | tail -1)
          if [ -n "$PREV_TAG" ] && [ "$PREV_TAG" != "$TAG" ]; then
            LOG=$(git log "${PREV_TAG}..${TAG}" --pretty=format:"- %s (%h)" -- extension/)
          else
            LOG=$(git log "${TAG}" --pretty=format:"- %s (%h)" -- extension/)
          fi
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$LOG" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: |
            ## Changes
            ${{ steps.changelog.outputs.body }}
          draft: false
          prerelease: false
