name: Release extension

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: "Version bump type"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck --workspace=extension

      - name: Test
        run: npm run test:run --workspace=extension

      - name: Bump version
        id: bump
        working-directory: extension
        run: |
          node scripts/bump-version.cjs ${{ github.event.inputs.bump_type }}
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Commit version bump and tag
        working-directory: extension
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json manifest-chrome.json manifest-firefox.json package.json
          git commit -m "release(extension): v${{ steps.bump.outputs.version }}"
          git tag "${{ steps.bump.outputs.tag }}"

      - name: Push commit and tag
        run: |
          git pull --rebase origin "${{ github.ref_name }}"
          git push origin HEAD:"${{ github.ref_name }}"
          git push origin "${{ steps.bump.outputs.tag }}"
