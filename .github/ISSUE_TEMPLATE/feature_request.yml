name: Feature Request
description: Suggest an idea or improvement for Loggy
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! Please describe your idea below.

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of Loggy would this affect?
      options:
        - Extension (DevTools panel / popup)
        - Server (loggy-serve)
        - Both
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem does this solve or what's missing?
      placeholder: "I'm frustrated when I have to manually ..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like it to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you've thought of?
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Mockups, references, or anything else useful.
    validations:
      required: false
